<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  body { margin: 0; padding: 40px; background: #1a1a18; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
</style>
</head>
<body>
<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">

  <!-- Background square (Facebook profile is displayed as circle, but source is square) -->
  <rect width="400" height="400" fill="#2C2C2A"/>

  <!-- Subtle inner border -->
  <rect x="16" y="16" width="368" height="368" fill="none" stroke="#EF9F27" stroke-width="1" opacity="0.25"/>

  <!-- Large watermark R -->
  <text x="210" y="420" font-family="Georgia, serif" font-size="500" font-weight="700" fill="#3a3a38" text-anchor="middle">R</text>

  <!-- R — bold white, left of center -->
  <text x="136" y="258" font-family="Georgia, serif" font-size="182" font-weight="700" fill="white" text-anchor="middle">R</text>

  <!-- V — amber, right of center, slightly smaller -->
  <text x="270" y="258" font-family="Georgia, serif" font-size="142" font-weight="400" fill="#EF9F27" text-anchor="middle">V</text>

  <!-- Amber bottom accent line -->
  <rect x="100" y="300" width="200" height="2" fill="#EF9F27" opacity="0.6"/>

  <!-- Wordmark below line -->
  <text x="200" y="332" font-family="Georgia, serif" font-size="18" font-weight="400" fill="rgba(255,255,255,0.5)" text-anchor="middle" letter-spacing="4">ROSSANO</text>
  <text x="200" y="356" font-family="Georgia, serif" font-size="18" font-weight="300" fill="#EF9F27" text-anchor="middle" letter-spacing="4" opacity="0.8">VENTURES</text>

</svg>
</body>
</html>
