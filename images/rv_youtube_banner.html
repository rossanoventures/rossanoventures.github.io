<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  body { margin: 0; padding: 0; background: #1a1a18; }
</style>
</head>
<body>
<svg xmlns="http://www.w3.org/2000/svg" width="2048" height="1152" viewBox="0 0 2048 1152">

  <!-- Background -->
  <rect width="2048" height="1152" fill="#2C2C2A"/>

  <!-- Top amber bar -->
  <rect x="0" y="0" width="2048" height="10" fill="#EF9F27"/>

  <!-- Large subtle watermark R -->
  <text x="1200" y="1200" font-family="Georgia, serif" font-size="1400" font-weight="700" fill="#333331" text-anchor="middle">R</text>

  <!-- Diagonal accent lines left side -->
  <line x1="0" y1="1152" x2="700" y2="0" stroke="#EF9F27" stroke-width="1.5" opacity="0.15"/>
  <line x1="80" y1="1152" x2="780" y2="0" stroke="#EF9F27" stroke-width="1" opacity="0.08"/>
  <line x1="160" y1="1152" x2="860" y2="0" stroke="#EF9F27" stroke-width="1" opacity="0.05"/>

  <!-- Left monogram box -->
  <rect x="120" y="296" width="380" height="380" rx="72" fill="#1f1f1d"/>
  <rect x="120" y="296" width="380" height="380" rx="72" fill="none" stroke="#EF9F27" stroke-width="2" opacity="0.35"/>
  <!-- R -->
  <text x="230" y="562" font-family="Georgia, serif" font-size="240" font-weight="700" fill="white" text-anchor="middle">R</text>
  <!-- V -->
  <text x="408" y="562" font-family="Georgia, serif" font-size="175" font-weight="400" fill="#EF9F27" text-anchor="middle">V</text>

  <!-- Vertical divider -->
  <line x1="560" y1="280" x2="560" y2="872" stroke="#EF9F27" stroke-width="2" opacity="0.25"/>

  <!-- Main text -->
  <text x="612" y="520" font-family="Georgia, serif" font-size="148" font-weight="700" fill="white">Rossano</text>
  <text x="612" y="668" font-family="Georgia, serif" font-size="148" font-weight="300" fill="#EF9F27">Ventures</text>

  <!-- Underline -->
  <rect x="612" y="700" width="820" height="4" fill="#EF9F27" opacity="0.5"/>

  <!-- Tagline -->
  <text x="612" y="760" font-family="Georgia, serif" font-size="36" font-weight="400" fill="#888780" letter-spacing="8">COMMERCE  &amp;  INTELLIGENCE</text>

  <!-- Location -->
  <text x="612" y="830" font-family="Georgia, serif" font-size="28" font-weight="300" fill="#555553" letter-spacing="6">ATLANTA, GEORGIA</text>

  <!-- Right side service cards -->
  <rect x="1560" y="296" width="380" height="168" rx="20" fill="#1f1f1d"/>
  <rect x="1560" y="296" width="380" height="168" rx="20" fill="none" stroke="#3d3d3a" stroke-width="1.5"/>
  <text x="1750" y="372" font-family="Georgia, serif" font-size="28" font-weight="400" fill="#EF9F27" text-anchor="middle" letter-spacing="4">COMMERCE</text>
  <text x="1750" y="420" font-family="Georgia, serif" font-size="26" font-weight="300" fill="#888780" text-anchor="middle" letter-spacing="2">Resale &amp; Liquidation</text>

  <rect x="1560" y="488" width="380" height="168" rx="20" fill="#1f1f1d"/>
  <rect x="1560" y="488" width="380" height="168" rx="20" fill="none" stroke="#3d3d3a" stroke-width="1.5"/>
  <text x="1750" y="564" font-family="Georgia, serif" font-size="28" font-weight="400" fill="#EF9F27" text-anchor="middle" letter-spacing="4">TECHNOLOGY</text>
  <text x="1750" y="612" font-family="Georgia, serif" font-size="26" font-weight="300" fill="#888780" text-anchor="middle" letter-spacing="2">AI Solutions</text>

  <rect x="1560" y="680" width="380" height="168" rx="20" fill="#1f1f1d"/>
  <rect x="1560" y="680" width="380" height="168" rx="20" fill="none" stroke="#3d3d3a" stroke-width="1.5"/>
  <text x="1750" y="756" font-family="Georgia, serif" font-size="28" font-weight="400" fill="#EF9F27" text-anchor="middle" letter-spacing="4">ROSSANOVENTURES</text>
  <text x="1750" y="804" font-family="Georgia, serif" font-size="26" font-weight="300" fill="#888780" text-anchor="middle" letter-spacing="2">.COM</text>

  <!-- Bottom amber bar -->
  <rect x="0" y="1142" width="2048" height="10" fill="#EF9F27"/>

</svg>
</body>
</html>
